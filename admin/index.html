<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Pin Hoàng Long</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div class="max-w-6xl mx-auto p-4 sm:p-6">
      <header class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h1 class="text-2xl font-semibold">Admin</h1>
          <p class="text-sm text-slate-600">
            CRUD sản phẩm qua API <code class="px-1 py-0.5 bg-slate-100 rounded">/api/admin/*</code>
          </p>
        </div>
        <div class="flex flex-col sm:flex-row gap-2 sm:items-center">
          <input
            id="adminToken"
            type="password"
            placeholder="ADMIN_TOKEN"
            class="w-full sm:w-80 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-slate-400"
          />
          <button
            id="saveTokenBtn"
            class="rounded-lg bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-800"
          >
            Lưu token
          </button>
        </div>
      </header>

      <main class="mt-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        <section class="lg:col-span-2 rounded-xl border border-slate-200 bg-white">
          <div class="p-4 border-b border-slate-200 flex items-center justify-between">
            <h2 class="font-semibold">Sản phẩm</h2>
            <div class="flex gap-2">
              <button
                id="refreshBtn"
                class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm hover:bg-slate-50"
              >
                Tải lại
              </button>
            </div>
          </div>

          <div class="p-4 overflow-auto">
            <table class="min-w-full text-sm">
              <thead>
                <tr class="text-left text-slate-600">
                  <th class="py-2 pr-3">ID</th>
                  <th class="py-2 pr-3">Tên</th>
                  <th class="py-2 pr-3">Giá</th>
                  <th class="py-2 pr-3">Danh mục</th>
                  <th class="py-2 pr-3">Ảnh</th>
                  <th class="py-2 pr-3"></th>
                </tr>
              </thead>
              <tbody id="productsTbody" class="align-top"></tbody>
            </table>
            <div id="productsEmpty" class="hidden text-center text-slate-600 py-10">
              Chưa có sản phẩm. Tạo bên phải.
            </div>
          </div>
        </section>

        <section class="rounded-xl border border-slate-200 bg-white">
          <div class="p-4 border-b border-slate-200">
            <h2 class="font-semibold">Tạo / Sửa sản phẩm</h2>
            <p class="text-xs text-slate-600 mt-1">
              Nếu bạn không nhập ID, hệ thống sẽ tự tăng ID.
            </p>
          </div>

          <form id="productForm" class="p-4 space-y-3">
            <input type="hidden" id="mode" value="create" />

            <div>
              <label class="block text-xs font-medium text-slate-700">ID</label>
              <input id="id" type="number" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm" />
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-700">categoryId</label>
              <input id="categoryId" type="number" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm" />
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-700">Tên</label>
              <input id="name" required class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm" />
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-xs font-medium text-slate-700">Giá</label>
                <input id="price" required type="number" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm" />
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-700">Giá gốc</label>
                <input id="originalPrice" type="number" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm" />
              </div>
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-700">Ảnh (URL)</label>
              <input id="image" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm" />
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-700">Mô tả</label>
              <textarea id="detail" rows="4" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm"></textarea>
            </div>

            <div class="flex gap-2">
              <button
                id="submitBtn"
                type="submit"
                class="flex-1 rounded-lg bg-emerald-600 px-3 py-2 text-sm font-medium text-white hover:bg-emerald-500"
              >
                Tạo mới
              </button>
              <button
                id="cancelEditBtn"
                type="button"
                class="hidden rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm hover:bg-slate-50"
              >
                Huỷ sửa
              </button>
            </div>
            <div id="status" class="text-xs text-slate-600"></div>
          </form>
        </section>
      </main>

      <section class="mt-6 rounded-xl border border-slate-200 bg-white">
        <div class="p-4 border-b border-slate-200 flex items-center justify-between">
          <div>
            <h2 class="font-semibold">Orders (MongoDB)</h2>
            <p class="text-xs text-slate-600 mt-1">Dữ liệu này lấy từ <code class="px-1 py-0.5 bg-slate-100 rounded">/api/admin/orders</code>.</p>
          </div>
          <button
            id="refreshOrdersBtn"
            class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm hover:bg-slate-50"
          >
            Tải orders
          </button>
        </div>
        <div class="p-4 overflow-auto">
          <pre id="ordersPre" class="text-xs whitespace-pre-wrap text-slate-800"></pre>
        </div>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
