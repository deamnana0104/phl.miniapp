<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Pin Hoàng Long</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div class="max-w-6xl mx-auto p-4 sm:p-6">
      <header class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h1 class="text-2xl font-semibold">Admin</h1>
          <p class="text-sm text-slate-600">
            CRUD dữ liệu qua API <code class="px-1 py-0.5 bg-slate-100 rounded">/api/admin/*</code>
          </p>
        </div>
        <div class="flex flex-col sm:flex-row gap-2 sm:items-center">
          <input
            id="adminToken"
            type="password"
            placeholder="ADMIN_TOKEN"
            class="w-full sm:w-80 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-slate-400"
          />
          <button
            id="saveTokenBtn"
            class="rounded-lg bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-800"
          >
            Lưu token
          </button>
        </div>
      </header>

      <main class="mt-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        <section class="lg:col-span-2 rounded-xl border border-slate-200 bg-white">
          <div class="p-4 border-b border-slate-200 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <h2 class="font-semibold">Dữ liệu</h2>
              <select
                id="entitySelect"
                class="rounded-lg border border-slate-200 bg-white px-2 py-2 text-sm"
              >
                <option value="products">Products</option>
                <option value="categories">Categories</option>
                <option value="banners">Banners</option>
                <option value="stations">Stations</option>
                <option value="orders">Orders</option>
              </select>
            </div>
            <div class="flex gap-2">
              <button
                id="refreshBtn"
                class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm hover:bg-slate-50"
              >
                Tải lại
              </button>
            </div>
          </div>

          <div class="p-4 overflow-auto">
            <div id="tableWrap">
              <table class="min-w-full text-sm">
                <thead id="tableThead"></thead>
                <tbody id="tableTbody" class="align-top"></tbody>
              </table>
              <div id="tableEmpty" class="hidden text-center text-slate-600 py-10">
                Chưa có dữ liệu.
              </div>
            </div>
          </div>
        </section>

        <section class="rounded-xl border border-slate-200 bg-white">
          <div class="p-4 border-b border-slate-200">
            <h2 class="font-semibold">Tạo / Sửa</h2>
            <p class="text-xs text-slate-600 mt-1">
              Chọn bảng ở bên trái để CRUD. Nếu bạn không nhập ID, hệ thống sẽ tự tăng ID.
            </p>
          </div>

          <form id="entityForm" class="p-4 space-y-3">
            <input type="hidden" id="mode" value="create" />
            <input type="hidden" id="entity" value="products" />

            <div>
              <label class="block text-xs font-medium text-slate-700">ID</label>
              <input id="id" type="number" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm" />
            </div>
            <div id="formFields" class="space-y-3"></div>

            <div class="flex gap-2">
              <button
                id="submitBtn"
                type="submit"
                class="flex-1 rounded-lg bg-emerald-600 px-3 py-2 text-sm font-medium text-white hover:bg-emerald-500"
              >
                Tạo mới
              </button>
              <button
                id="cancelEditBtn"
                type="button"
                class="hidden rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm hover:bg-slate-50"
              >
                Huỷ sửa
              </button>
            </div>
            <div id="status" class="text-xs text-slate-600"></div>
          </form>
        </section>
      </main>

      <section class="mt-6 rounded-xl border border-slate-200 bg-white">
        <div class="p-4 border-b border-slate-200 flex items-center justify-between">
          <div>
            <h2 class="font-semibold">JSON preview</h2>
            <p class="text-xs text-slate-600 mt-1">Xem nhanh response từ API.</p>
          </div>
          <button
            id="refreshJsonBtn"
            class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm hover:bg-slate-50"
          >
            Tải JSON
          </button>
        </div>
        <div class="p-4 overflow-auto">
          <pre id="jsonPre" class="text-xs whitespace-pre-wrap text-slate-800"></pre>
        </div>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
